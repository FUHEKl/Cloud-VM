##############################################################################
# HTTP — redirect all traffic to HTTPS
##############################################################################
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

##############################################################################
# HTTPS — main reverse-proxy
##############################################################################
server {
    listen 443 ssl http2;
    server_name _;

    # Resolve Docker service names at runtime to avoid stale upstream IPs
    # after container recreations (prevents intermittent 502 errors).
    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # SECURITY: enforce HTTPS and tighten browser-side attack surface.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    ##########################################################################
    # Terminal WebSocket  (/terminal/socket.io/*)
    ##########################################################################
    location /terminal/ {
        set                $gateway_upstream gateway:3001;
        proxy_pass         http://$gateway_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Edge-Token      "edge-local-dev-token-change-me";

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    ##########################################################################
    # VM-events WebSocket  (/vm-events/socket.io/*)
    ##########################################################################
    location /vm-events/ {
        set                $gateway_upstream gateway:3001;
        proxy_pass         http://$gateway_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Edge-Token      "edge-local-dev-token-change-me";

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    ##########################################################################
    # AI chat WebSocket  (/ai-chat/socket.io/*)
    ##########################################################################
    location /ai-chat/ {
        set                $gateway_upstream gateway:3001;
        proxy_pass         http://$gateway_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Edge-Token      "edge-local-dev-token-change-me";

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    ##########################################################################
    # Auth API  (/api/auth/*)  → gateway :3001
    ##########################################################################
    location /api/auth/ {
        set                $gateway_upstream gateway:3001;
        proxy_pass         http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Edge-Token      "edge-local-dev-token-change-me";

        client_max_body_size 1m;
    }

    ##########################################################################
    # REST API  (/api/*)  →  gateway :3001
    # IMPORTANT: no trailing slash in proxy_pass, to preserve /api prefix.
    ##########################################################################
    location /api/ {
        set                $gateway_upstream gateway:3001;
        proxy_pass         http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Edge-Token      "edge-local-dev-token-change-me";

        client_max_body_size 512k;
    }

    ##########################################################################
    # Next.js frontend  (everything else)
    ##########################################################################
    location / {
        # Use host-mapped frontend port to avoid stale container IP routing
        # causing intermittent 502 after container recreation.
        proxy_pass         http://host.docker.internal:3000;
        proxy_http_version 1.1;

        # Next.js HMR WebSocket (dev) — harmless in prod
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Edge-Token      "edge-local-dev-token-change-me";
    }
}
