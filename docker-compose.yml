services:
  # ── Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudvm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudvm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cloudvm}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres/init-microservice-databases.sql:/docker-entrypoint-initdb.d/01-init-microservice-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudvm"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

  # ── NATS ──────────────────────────────────────────
  nats:
    image: nats:2-alpine
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js"]

  # ── Nginx reverse-proxy (HTTPS :443) ─────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - EDGE_PROXY_TOKEN=${EDGE_PROXY_TOKEN:-edge-local-dev-token-change-me}
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl
    command: >
      /bin/sh -c "
      apk add --no-cache openssl gettext >/dev/null 2>&1;
      envsubst '$$EDGE_PROXY_TOKEN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf;
      if [ ! -f /etc/nginx/ssl/server.crt ] || [ ! -f /etc/nginx/ssl/server.key ]; then
        echo '[nginx] Generating local self-signed certificate for HTTPS...';
        mkdir -p /etc/nginx/ssl;
        openssl req -x509 -nodes -newkey rsa:2048 -days 365 -keyout /etc/nginx/ssl/server.key -out /etc/nginx/ssl/server.crt -subj '/CN=localhost';
      fi;
      nginx -g 'daemon off;'
      "
    depends_on:
      - gateway
      - frontend

  # ── API Gateway ──────────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    expose:
      - "3001"
    environment:
      - AUTH_SERVICE_URL=http://auth:3002
      - USER_SERVICE_URL=http://user:3003
      - VM_SERVICE_URL=http://vm:3004
      - AI_SERVICE_URL=http://ai:3006
      - PAYMENT_SERVICE_URL=http://payment:3005
      - EDGE_PROXY_TOKEN=${EDGE_PROXY_TOKEN:-edge-local-dev-token-change-me}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REDIS_HOST=redis
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - redis
      - auth
      - user
      - vm
      - ai
      - payment

  # ── Payment Service ──────────────────────────────
  payment:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3005"
    environment:
      - DATABASE_URL=${PAYMENT_DATABASE_URL:-postgresql://${POSTGRES_USER:-cloudvm}:${POSTGRES_PASSWORD:-cloudvm_secret}@postgres:5432/${POSTGRES_DB:-cloudvm}}
      - PLAN_CATALOG_JSON=${PLAN_CATALOG_JSON}
      - USER_SERVICE_URL=http://user:3003
      - INTER_SERVICE_SYNC_TOKEN=${INTER_SERVICE_SYNC_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - PUBLIC_APP_ORIGIN=${PUBLIC_APP_ORIGIN:-http://localhost:3000}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Auth Service ─────────────────────────────────
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - DATABASE_URL=${AUTH_DATABASE_URL:-postgresql://${POSTGRES_USER:-cloudvm}:${POSTGRES_PASSWORD:-cloudvm_secret}@postgres:5432/${POSTGRES_DB:-cloudvm}}
      - USER_SERVICE_URL=http://user:3003
      - INTER_SERVICE_SYNC_TOKEN=${INTER_SERVICE_SYNC_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ── User Service ─────────────────────────────────
  user:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3003"
    environment:
      - DATABASE_URL=${USER_DATABASE_URL:-postgresql://${POSTGRES_USER:-cloudvm}:${POSTGRES_PASSWORD:-cloudvm_secret}@postgres:5432/${POSTGRES_DB:-cloudvm}}
      - PLAN_CATALOG_JSON=${PLAN_CATALOG_JSON}
      - INTER_SERVICE_SYNC_TOKEN=${INTER_SERVICE_SYNC_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      # ── Email (student verification) ──────────────
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - STUDENT_EMAIL_DOMAINS=${STUDENT_EMAIL_DOMAINS}
    depends_on:
      postgres:
        condition: service_healthy

  # ── VM Service ───────────────────────────────────
  vm:
    build:
      context: ./services/vm
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3004"
    environment:
      - DATABASE_URL=${VM_DATABASE_URL:-postgresql://${POSTGRES_USER:-cloudvm}:${POSTGRES_PASSWORD:-cloudvm_secret}@postgres:5432/${POSTGRES_DB:-cloudvm}}
      - VM_SSH_KEY_SECRET=${VM_SSH_KEY_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - NATS_URL=nats://nats:4222
      - REDIS_HOST=redis
      - CORS_ORIGIN=${CORS_ORIGIN}
      - ONE_XMLRPC=${ONE_XMLRPC:-}
      - ONE_USERNAME=${ONE_USERNAME:-}
      - ONE_PASSWORD=${ONE_PASSWORD:-}
      - TERMINAL_SSH_BASTION_HOST=${TERMINAL_SSH_BASTION_HOST:-}
      - TERMINAL_SSH_BASTION_PORT=${TERMINAL_SSH_BASTION_PORT:-22}
      - TERMINAL_SSH_BASTION_USERNAME=${TERMINAL_SSH_BASTION_USERNAME:-}
      - TERMINAL_SSH_BASTION_PASSWORD=${TERMINAL_SSH_BASTION_PASSWORD:-}
      - TERMINAL_SSH_BASTION_PRIVATE_KEY=${TERMINAL_SSH_BASTION_PRIVATE_KEY:-}
      - TERMINAL_SSH_CONNECT_TIMEOUT_MS=${TERMINAL_SSH_CONNECT_TIMEOUT_MS:-20000}
      - TERMINAL_DEFAULT_VM_PASSWORD=${TERMINAL_DEFAULT_VM_PASSWORD:-cloudvm123}
      - USER_SERVICE_URL=${USER_SERVICE_URL:-http://user:3003}
      - INTER_SERVICE_SYNC_TOKEN=${INTER_SERVICE_SYNC_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started

  # ── AI Service ───────────────────────────────────
  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3006"
    environment:
      - DATABASE_URL=${AI_DATABASE_URL:-postgresql://${POSTGRES_USER:-cloudvm}:${POSTGRES_PASSWORD:-cloudvm_secret}@postgres:5432/${POSTGRES_DB:-cloudvm}}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - VM_SERVICE_URL=http://vm:3004
      - USER_SERVICE_URL=http://user:3003
      - AI_RATE_LIMIT_PER_MIN=${AI_RATE_LIMIT_PER_MIN:-20}
      - AI_ACTION_CONFIRM_SECRET=${AI_ACTION_CONFIRM_SECRET:-}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_FALLBACK_ENABLED=${AI_FALLBACK_ENABLED:-true}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Ollama (optional local model) ───────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    expose:
      - "11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python Worker ────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_HOST=redis
      - ONE_XMLRPC=${ONE_XMLRPC}
      - ONE_USERNAME=${ONE_USERNAME}
      - ONE_PASSWORD=${ONE_PASSWORD}
      - ONE_IP_OFFSET=${ONE_IP_OFFSET:-0}
      - INJECT_EXTRA_SSH_KEYS=${INJECT_EXTRA_SSH_KEYS:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudvm}:${POSTGRES_PASSWORD:-cloudvm_secret}@postgres:5432/${POSTGRES_DB:-cloudvm}
      - EXTRA_SSH_KEYS_FILE=/app/extra_ssh_keys.txt
    volumes:
      - ./worker/extra_ssh_keys.txt:/app/extra_ssh_keys.txt:ro
    depends_on:
      nats:
        condition: service_started
      redis:
        condition: service_started

  # ── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_VM_WS_URL: ${NEXT_PUBLIC_VM_WS_URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_VM_WS_URL=${NEXT_PUBLIC_VM_WS_URL}
    depends_on:
      - gateway

volumes:
  pgdata:
  redisdata:
  ollama_data: